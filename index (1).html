

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>小田急時刻表ビュワー</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #005a9c; border-bottom: 2px solid #005a9c; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background: #005a9c; color: white; }
        .train-row:hover { background: #eef; }
    </style>
</head>
<body>
    <div class="container">
        <h1>小田急時刻表データ表示</h1>
        <input type="file" id="fileInput" accept=".oud">
        <div id="tableContainer"></div>
    </div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            // OuDiaはShift_JIS
            reader.readAsText(file, 'Shift_JIS');
            reader.onload = function(e) {
                renderTable(e.target.result);
            };
        });

        function renderTable(text) {
            const lines = text.split(/\r?\n/);
            let stations = [];
            let trains = [];
            
            // 簡易解析
            let currentSection = "";
            let currentTrain = null;

            for (let line of lines) {
                if (line.includes("Eki.")) { currentSection = "Eki"; continue; }
                if (line.includes("Ressya.")) { 
                    currentTrain = { times: [] };
                    currentSection = "Ressya";
                    continue;
                }
                if (line === ".") { currentSection = ""; continue; }
                
                if (currentSection === "Eki" && line.startsWith("Ekimei=")) {
                    stations.push(line.split('=')[1]);
                }
                if (currentSection === "Ressya" && line.startsWith("EkiJikoku=")) {
                    currentTrain.times = line.split('=')[1].split(',');
                    trains.push(currentTrain);
                }
            }

            let html = '<table><thead><tr><th>列車</th>';
            stations.forEach(s => html += `<th>${s}</th>`);
            html += '</tr></thead><tbody>';
            
            trains.forEach((t, i) => {
                html += `<tr class="train-row"><td>列車${i+1}</td>`;
                t.times.forEach(time => {
                    // 1;200 などの形式を簡易整形
                    let displayTime = time.replace('1;', '').replace('2;', '通過').replace(/\//g, '<br>');
                    html += `<td>${displayTime}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
        }
    </script>
</body>
</html>
